<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fauzstore</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#000,#222);
color:white;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

.card{
background:white;
border-radius:20px;
padding:25px;
text-align:center;
color:black;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.logo{
width:120px;
margin-bottom:10px;
}

h1{
margin:5px 0;
font-size:28px;
}

.tagline{
color:#d4af37;
font-weight:bold;
}

.menu{
text-decoration:none;
}

.menu-box{
background:#f3f3f3;
padding:16px;
margin-top:15px;
border-radius:12px;
display:flex;
justify-content:space-between;
font-weight:bold;
}

#produk{
display:none;
}

.produk{
margin-top:30px;
}

#product-list{
display:grid;
gap:20px;
}

.product{
background:white;
border-radius:18px;
padding:20px;
text-align:center;
color:black;
}

.product img{
width:90px;
}

.price{
font-size:22px;
font-weight:bold;
margin:10px;
}

.btn{
background:#25D366;
color:white;
padding:12px;
border-radius:10px;
display:block;
text-decoration:none;
font-weight:bold;
}

select{
width:100%;
padding:10px;
border-radius:8px;
margin-top:10px;
margin-bottom:10px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<img src="logo.png" class="logo">

<h1>Fauzstore</h1>

<p class="tagline">✨ Premium App Shop ✨</p>

<a href="javascript:void(0)" onclick="showProduk()" class="menu">
<div class="menu-box">
📦 Katalog Produk
<span>➜</span>
</div>
</a>

<a href="https://wa.me/6285784381059?text=Halo%20Fauzstore,%20Saya%20ingin%20bertanya%20tentang%20produk%20premium" class="menu">
<div class="menu-box">
💬 CS WhatsApp
<span>➜</span>
</div>
</a>

</div>

<div id="produk" class="produk">

<h2>Daftar Produk</h2>

<div id="product-list"></div>

</div>

</div>

}

const list = document.getElementById("product-list");

products.forEach((p,index)=>{

let options="";

for(let pack in p.packages){

options+=`<option value="${p.packages[pack]}">${pack} - ${p.packages[pack]}</option>`

}

list.innerHTML+=`

<div class="product">

<img src="${p.image}">

<h3>${p.name}</h3>

<select onchange="updatePrice(${index},this)">
${options}
</select>

<div class="price" id="price${index}">
${Object.values(p.packages)[0]}
</div>

<a class="btn" id="btn${index}" target="_blank">
Beli via WhatsApp
</a>

</div>

`

updateButton(index,p.name,Object.keys(p.packages)[0],Object.values(p.packages)[0])

})


function updatePrice(index,select){

let text = select.options[select.selectedIndex].text
let pack = text.split(" - ")[0]
let price = select.value

document.getElementById("price"+index).innerText = price

updateButton(index,products[index].name,pack,price)

}

function updateButton(index,name,pack,price){
  
let message = `Halo Fauzstore,%0A%0ASaya ingin membeli:%0AProduk: ${name}%0APaket: ${pack}%0AHarga: ${price}%0A%0AApakah masih tersedia?`

let url = `https://wa.me/6285784381059?text=${message}`

document.getElementById("btn"+index).href = url

}

function showProduk(){

let produk = document.getElementById("produk");

if(produk.style.display === "none"){
produk.style.display = "block";
}else{
produk.style.display = "none";
}

}

</script>
